<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nagy's AI Chatbot</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <!-- Main chat wrapper -->
    <div id="app">

      <!-- Header bar (like WhatsApp Web top bar) -->
      <header id="chat-header">
        <div id="bot-avatar">🤖</div>
        <div id="bot-info">
          <span id="bot-name">Nagy's Bot</span>
          <span id="bot-status">Online</span>
        </div>
        <!-- Model selector — populated dynamically from the API -->
        <div id="model-selector-wrapper">
          <label for="model-select">Model</label>
          <select id="model-select" title="Select chat model"></select>
        </div>
      </header>

      <!-- Scrollable messages area -->
      <main id="messages"></main>

      <!-- Input area at the bottom -->
      <footer id="input-area">
        <input
          type="text"
          id="message-input"
          placeholder="Type a message..."
          autocomplete="off"
        />
        <button id="send-button" title="Send message">Send</button>
        <div id="image-controls">
          <select id="image-model-select" title="Select image model"></select>
          <button id="image-button" title="Generate image">🖼️ Image</button>
        </div>
      </footer>

    </div>

    <!-- Entry point — type="module" enables ES Modules -->
    <script type="module" src="js/main.js"></script>
  </body>
</html>
